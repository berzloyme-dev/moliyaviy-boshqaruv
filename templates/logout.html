{% load static %}
<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chiqish</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="relative min-h-screen text-white">

    <!-- BACKGROUND -->
    <div class="fixed inset-0 -z-10">
        <img src="{% static 'images/rasm2.jpg' %}"
             class="w-full h-full object-cover">
        <div class="absolute inset-0 bg-gradient-to-br from-slate-900/90 via-amber-900/80 to-slate-800/90"></div>
    </div>

    <!-- MAIN CONTENT -->
    <div class="min-h-screen flex items-center justify-center p-6">

        <div class="w-full max-w-lg
                    bg-slate-800/80
                    backdrop-blur-xl
                    border-2 border-amber-500/30
                    rounded-3xl
                    shadow-2xl
                    p-10">

            <!-- ICON -->
            <div class="flex justify-center mb-8">
                <div class="w-24 h-24 bg-gradient-to-br from-red-500 to-red-600 rounded-2xl flex items-center justify-center text-5xl shadow-lg shadow-red-500/30">
                    👋
                </div>
            </div>

            <h2 class="text-4xl font-bold text-center mb-3 text-amber-400">
                Tizimdan chiqmoqchimisiz?
            </h2>
            <p class="text-center text-gray-300 mb-10 text-lg">
                Haqiqatan ham tizimdan chiqishni xohlaysizmi?
            </p>

            <form method="post" class="space-y-4">
                {% csrf_token %}

                <button type="submit"
                    class="w-full py-4 text-lg bg-red-600 hover:bg-red-700 text-white rounded-xl font-semibold transition shadow-lg border-2 border-red-500 transform hover:-translate-y-0.5">
                    ✓ Ha, chiqish
                </button>

                <a href="{% url 'dashboard' %}"
                   class="block w-full py-4 text-lg text-center bg-slate-700/50 hover:bg-slate-700 text-white rounded-xl font-semibold transition border-2 border-amber-500/30 hover:border-amber-500/50 shadow-lg">
                    ← Yo'q, qaytish
                </a>
            </form>

        </div>

    </div>

</body>
</html>
