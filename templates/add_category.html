{% extends 'base.html' %}
{% block title %}Yangi kategoriya{% endblock %}

{% block content %}

<div class="max-w-3xl mx-auto">

    <div class="bg-white/10 backdrop-blur-lg border border-white/20 rounded-3xl p-10">

        <h2 class="text-4xl font-bold mb-10 text-white">
            Yangi Kategoriya yaratish
        </h2>

        <form method="post" class="space-y-8">
            {% csrf_token %}

            <div>
                <label class="block text-lg text-gray-300 mb-3 font-medium">
                    Kategoriya nomi
                </label>
                <input type="text" 
                       name="name" 
                       class="w-full px-5 py-4 text-lg bg-white/10 border border-white/20 rounded-xl 
                              text-white placeholder-gray-400
                              focus:ring-2 focus:ring-white/50 focus:border-white/50 
                              outline-none transition backdrop-blur"
                       placeholder="Masalan: Ovqat, Yo'l haqi, Oylik" 
                       required>
            </div>

            <button type="submit"
                class="w-full py-4 text-lg bg-white/20 hover:bg-white/30 rounded-xl font-semibold transition backdrop-blur">
                Saqlash
            </button>
        </form>

        <div class="mt-8 text-center">
            <a href="{% url 'add_transaction' %}"
               class="inline-block px-6 py-3 border border-white/20 rounded-xl hover:bg-white/10 transition text-base font-medium">
               ← Orqaga qaytish
            </a>
        </div>

    </div>

</div>

{% endblock %}
